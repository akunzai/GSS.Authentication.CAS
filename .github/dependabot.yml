---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: npm
    directory: /samples/AspNetCoreReactSample/ClientApp
    schedule:
      interval: monthly
    cooldown:
      default-days: 3
    groups:
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
          - '@vitejs/plugin-react'
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly
