# https://mise.jdx.dev/
# Pins the developer toolchain so local, devcontainer, and CI environments match.
#
# Notes:
# - The .NET 10 SDK builds every target framework in this repo
#   (net10.0/net8.0/netstandard2.0/netcoreapp3.1). Only ONE SDK is needed to build.
# - net8.0 just needs its ASP.NET Core runtime to *run* the net8 tests and samples,
#   so it is installed runtime-only (leaner than a full net8 SDK). Wildcards/major
#   version wildcards like "8" resolve to the latest SDK version (e.g. 8.0.422),
#   which fails to install because dotnet-install.sh looks for a matching runtime
#   version that does not exist. Pin a specific runtime version (e.g. "8.0.28").
# - net462/net48 (OWIN) require Windows + MSBuild and are out of mise's scope.
[tools]
dotnet = ["10", { version = "8.0.28", runtime = "aspnetcore" }]
node = "lts"
aube = "latest"
